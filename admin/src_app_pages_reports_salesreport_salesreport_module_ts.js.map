<ux-secondary-toolbar current="Reports">
  <ux-breadcrumbs [crumbs]="['Reports', 'Consolidated Sales Report']" class="flex-auto"></ux-breadcrumbs>
</ux-secondary-toolbar>

<mat-card class="w3-margin">
  <mat-form-field appearance="standard" style="margin-bottom: -1.3em; padding: 0; margin-right: 10px;">
    <mat-label>From Date</mat-label>
    <input matInput [matDatepicker]="from_picker" [(ngModel)]="from_date">
    <mat-datepicker-toggle matSuffix [for]="from_picker"></mat-datepicker-toggle>
    <mat-datepicker #from_picker></mat-datepicker>
  </mat-form-field>
  <mat-form-field appearance="standard" style="margin-bottom: -1.3em; padding: 0; margin-right: 10px;">
    <mat-label>To Date</mat-label>
    <input matInput [matDatepicker]="to_picker" [(ngModel)]="to_date">
    <mat-datepicker-toggle matSuffix [for]="to_picker"></mat-datepicker-toggle>
    <mat-datepicker #to_picker></mat-datepicker>
  </mat-form-field>
  <button mat-stroked-button class="w3-black" (click)="onSearchClick()">SEARCH</button>
</mat-card>

<mat-card class="w3-margin" *ngIf="report_data.length > 0">
  <div class="w3-margin-bottom">
    <p>TOTAL UNITS: <b>{{ report_data.length }}</b></p>
  </div>
  <table class="w3-table-all w3-small">
    <tr>
      <th>#</th>
      <th>Unit Name</th>
      <th>Total Transactions</th>
      <th>Total Amount</th>
    </tr>
    <tr *ngFor="let row of report_data; let i = index">
      <td>{{ i + 1 }}</td>
      <td>{{ row.unit_name }}</td>
      <td>{{ row.orders?.length }}</td>
      <td>&#8377;{{ row.total }}</td>
    </tr>
    <tr style="font-weight: bold; background: #f5f5f5;">
      <td colspan="2">GRAND TOTAL</td>
      <td>{{ grand_orders }}</td>
      <td>&#8377;{{ grand_total }}</td>
    </tr>
  </table>
</mat-card>

<mat-card class="w3-margin" *ngIf="report_data.length === 0 && searched">
  <p style="text-align:center; color: #888;">No records found for the selected date range.</p>
</mat-card>
