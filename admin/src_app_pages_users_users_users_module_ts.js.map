<form (ngSubmit)="save()" [formGroup]="form">
  <div class="flex items-center" mat-dialog-title>
    <h2 *ngIf="form.get('first_name').value" class="headline m-0 flex-auto">{{ form.get('first_name').value }}</h2>
    <h2 *ngIf="!form.get('first_name').value" class="headline m-0 flex-auto">New User</h2>

    <button class="text-secondary" mat-dialog-close mat-icon-button type="button">
      <mat-icon svgIcon="mat:close"></mat-icon>
    </button>
  </div>

  <mat-divider class="-mx-6 text-border"></mat-divider>

  <mat-dialog-content class="flex flex-col">
    <div class="flex flex-col sm:flex-row">
      <mat-form-field class="mt-6 flex-auto">
        <mat-label>First Name</mat-label>
        <input cdkFocusInitial formControlName="first_name" matInput>
        <mat-icon class="mr-3" matPrefix svgIcon="mat:person"></mat-icon>
      </mat-form-field>
      <mat-form-field class="sm:mt-6 sm:ml-6 flex-auto">
        <mat-label>Last Name</mat-label>
        <input formControlName="last_name" matInput>

        <mat-icon class="mr-3" matPrefix svgIcon="mat:person"></mat-icon>
      </mat-form-field>
    </div>
    <div class="flex flex-col sm:flex-row">
      <mat-form-field class="mt-6 flex-auto">
        <mat-label>Mobile</mat-label>
        <input cdkFocusInitial formControlName="mobile" matInput>
      </mat-form-field>

      <mat-form-field class="sm:mt-6 sm:ml-6 flex-auto">
        <mat-label>Email</mat-label>
        <input formControlName="email" matInput>
      </mat-form-field>
    </div>
    <div class="flex flex-col sm:flex-row">
      <mat-form-field class="mt-6 flex-auto">
        <mat-label>Group</mat-label>
        <mat-select formControlName="group_id">
          <mat-option *ngFor="let obj of groups_list" [value]="obj._id">
            {{ obj.group_name }}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field class="sm:mt-6 sm:ml-6 flex-auto">
        <mat-label>Unit</mat-label>
        <mat-select formControlName="unit_id" (selectionChange)="onUnitChange($event)">
          <mat-option *ngFor="let obj of units_list" [value]="obj._id">
            {{ obj.unit_name }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
    <div class="flex flex-col">
      <mat-form-field class="mt-6 flex-auto">
        <mat-label>Activity</mat-label>
        <mat-select formControlName="activity_id">
          <mat-option *ngFor="let obj of activities_list" [value]="obj._id">
            {{ obj.activity_name }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="flex flex-col sm:flex-row">
      <mat-form-field class="mt-6 flex-auto">
        <mat-label>Date Format</mat-label>
        <mat-select formControlName="date_format">
          <mat-option *ngFor="let obj of dateformat_list" [value]="obj.format">
            {{obj.format }}
        </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field class="sm:mt-6 sm:ml-6 flex-auto">
        <mat-label>Time Format</mat-label>
        <mat-select formControlName="time_format">
          <mat-option *ngFor="let obj of timeformat_list" [value]="obj.value">
            {{obj.format }}
        </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button mat-dialog-close type="button">Cancel</button>
    <button *ngIf="isCreateMode()" color="primary" mat-flat-button type="submit">Create User</button>
    <button *ngIf="isUpdateMode()" color="primary" mat-flat-button type="submit">Update User</button>
  </mat-dialog-actions>
</form>
