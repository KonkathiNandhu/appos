<div class="flex items-center" mat-dialog-title>
  <h2 class="headline m-0 flex-auto">{{ defaults.notificationinfo.unit_name }}</h2>

  <button class="text-secondary" mat-dialog-close mat-icon-button type="button">
    <mat-icon svgIcon="mat:close"></mat-icon>
  </button>
</div>

<mat-divider class="-mx-6 text-border"></mat-divider>

<mat-dialog-content class="flex flex-col">
  <table class="w3-table-all">
    <tr>
      <th style="width: 20%;">Notification Date</th>
      <th style="width: 60%;">Notification</th>
      <th style="width: 20%;">Action</th>
    </tr>
    <tr *ngFor="let notification of defaults.notificationinfo.notifications">
      <td style="width: 20%;">{{ notification.created_date }}</td>
      <td style="width: 60%;">{{ notification.notification_description }}</td>
      <td style="width: 20%;">
        <button class="w3-red" mat-flat-button type="button">OPEN</button>
      </td>
    </tr>
  </table>
</mat-dialog-content>
