<ux-secondary-toolbar current="Dashboard">
  <ux-breadcrumbs [crumbs]="['Dashboards', 'Analytics']" class="flex-auto"></ux-breadcrumbs>
</ux-secondary-toolbar>

<div class="container p-gutter grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">

  <mat-card *ngFor="let unit of unitnotifications_list">
    <div class="w3-center">
        <h2 class="headline font-bold m-0 w3-padding">{{ unit.unit_name }}</h2>
        <p class="w3-xxxlarge w3-padding w3-text-red" style="font-weight: 600; cursor: pointer;" *ngIf="unit.notifications.length > 0" (click)="onOpenNotifications(unit)">{{ unit.notifications.length }}</p>
        <p class="w3-xxxlarge w3-padding w3-text-green" style="font-weight: 600;" *ngIf="unit.notifications.length === 0">{{ unit.notifications.length }}</p>
        <p class="caption text-secondary m-0">Notifications</p>
      </div>
  </mat-card>

</div>
