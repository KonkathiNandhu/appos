<ux-page-layout>

  <ux-page-layout-header class="pb-10 flex flex-col items-start justify-center">
    <div [class.container]="layoutCtrl.value === 'boxed'"
         [class.px-gutter]="layoutCtrl.value === 'fullwidth'"
         class="w-full flex flex-col sm:flex-row justify-between">
      <div>
        <span class="title mt-0 mb-1" style="display: block; font-size: 30px; font-weight: 600;">Cultural Events</span>
        <ux-breadcrumbs [crumbs]="['CMS', 'Cultural Events']"></ux-breadcrumbs>
      </div>
    </div>
  </ux-page-layout-header>

  <ux-page-layout-content [class.container]="layoutCtrl.value === 'boxed'"
                           [class.px-gutter]="layoutCtrl.value === 'fullwidth'"
                           class="-mt-6">

    <div class="card -mt-16 p-6" @fadeInUp>
      <form [formGroup]="form" (ngSubmit)="save()">

        <h3 class="font-semibold text-lg mb-2">Page Description</h3>
        <mat-form-field class="w-full mt-2">
          <mat-label>Description (shown at top of page)</mat-label>
          <textarea formControlName="page_description" matInput rows="6"></textarea>
        </mat-form-field>

        <mat-divider class="my-4"></mat-divider>

        <div class="flex flex-col sm:flex-row gap-4">
          <mat-form-field class="flex-auto">
            <mat-label>Status</mat-label>
            <mat-select formControlName="status">
              <mat-option value="1">Active</mat-option>
              <mat-option value="0">In-Active</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <mat-divider class="my-4"></mat-divider>

        <div class="flex items-center justify-between mb-2">
          <h3 class="font-semibold text-lg m-0">Event Cards (displayed in grid)</h3>
          <button (click)="addEvent()" color="primary" mat-stroked-button type="button">
            <mat-icon svgIcon="mat:add" class="mr-1"></mat-icon>
            Add Event Card
          </button>
        </div>

        <div formArrayName="cultural_events">
          <div *ngFor="let event of culturalEvents.controls; let i = index" [formGroupName]="i"
               class="border rounded p-4 mb-4">

            <div class="flex items-center justify-between mb-3">
              <span class="font-semibold text-base">Card {{ i + 1 }}</span>
              <button (click)="removeEvent(i)" color="warn" mat-icon-button type="button" matTooltip="Remove Card">
                <mat-icon svgIcon="mat:delete"></mat-icon>
              </button>
            </div>

            <mat-form-field class="w-full">
              <mat-label>Title (shown on card)</mat-label>
              <input formControlName="title" matInput>
              <mat-icon class="mr-3" matPrefix svgIcon="mat:title"></mat-icon>
            </mat-form-field>

            <mat-form-field class="w-full">
              <mat-label>Image URL (card image)</mat-label>
              <input formControlName="image1" matInput>
              <mat-icon class="mr-3" matPrefix svgIcon="mat:image"></mat-icon>
            </mat-form-field>

          </div>
        </div>

        <mat-divider class="my-4"></mat-divider>

        <div class="flex justify-end">
          <button color="primary" mat-flat-button type="submit">
            <mat-icon svgIcon="mat:save" class="mr-2"></mat-icon>
            {{ existingId ? 'Update' : 'Save' }} Cultural Events
          </button>
        </div>

      </form>
    </div>

  </ux-page-layout-content>

</ux-page-layout>
