<ux-page-layout>

  <ux-page-layout-header class="pb-10 flex flex-col items-start justify-center">
    <div [class.container]="layoutCtrl.value === 'boxed'"
         [class.px-gutter]="layoutCtrl.value === 'fullwidth'"
         class="w-full flex flex-col sm:flex-row justify-between">
      <div>
        <span class="title mt-0 mb-1" style="display: block; font-size: 30px; font-weight: 600;">Handlooms</span>
        <ux-breadcrumbs [crumbs]="['CMS', 'Handlooms']"></ux-breadcrumbs>
      </div>
    </div>
  </ux-page-layout-header>

  <ux-page-layout-content [class.container]="layoutCtrl.value === 'boxed'"
                           [class.px-gutter]="layoutCtrl.value === 'fullwidth'"
                           class="-mt-6">

    <div class="card -mt-16 p-6" @fadeInUp>
      <form [formGroup]="form" (ngSubmit)="save()">

        <h3 class="font-semibold text-lg mb-2">Description</h3>
        <mat-form-field class="w-full mt-2">
          <mat-label>Handlooms Description</mat-label>
          <textarea formControlName="description" matInput rows="6"></textarea>
        </mat-form-field>

        <mat-divider class="my-4"></mat-divider>

        <div class="flex flex-col sm:flex-row gap-4">
          <mat-form-field class="flex-auto">
            <mat-label>Status</mat-label>
            <mat-select formControlName="status">
              <mat-option value="1">Active</mat-option>
              <mat-option value="0">In-Active</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <mat-divider class="my-4"></mat-divider>

        <div class="flex items-center justify-between mb-2">
          <h3 class="font-semibold text-lg m-0">Handloom Items</h3>
          <button (click)="addItem()" color="primary" mat-stroked-button type="button">
            <mat-icon svgIcon="mat:add" class="mr-1"></mat-icon>
            Add Item
          </button>
        </div>

        <div formArrayName="gallery_sections">
          <div *ngFor="let item of gallerySections.controls; let i = index" [formGroupName]="i"
               class="border rounded p-4 mb-4">

            <div class="flex items-center justify-between mb-3">
              <span class="font-semibold text-base">Item {{ i + 1 }}</span>
              <button (click)="removeItem(i)" color="warn" mat-icon-button type="button" matTooltip="Remove Item">
                <mat-icon svgIcon="mat:delete"></mat-icon>
              </button>
            </div>

            <div class="flex flex-col sm:flex-row gap-4">
              <mat-form-field class="flex-auto">
                <mat-label>Name</mat-label>
                <input formControlName="name" matInput>
                <mat-icon class="mr-3" matPrefix svgIcon="mat:label"></mat-icon>
              </mat-form-field>

              <mat-form-field class="flex-auto">
                <mat-label>Detail URL</mat-label>
                <input formControlName="detail_url" matInput>
              </mat-form-field>
            </div>

            <mat-form-field class="w-full">
              <mat-label>Image URL</mat-label>
              <input formControlName="image_url" matInput>
              <mat-icon class="mr-3" matPrefix svgIcon="mat:image"></mat-icon>
            </mat-form-field>

            <mat-form-field class="w-full">
              <mat-label>Description 1</mat-label>
              <textarea formControlName="description1" matInput rows="3"></textarea>
            </mat-form-field>

            <mat-form-field class="w-full">
              <mat-label>Description 2</mat-label>
              <textarea formControlName="description2" matInput rows="3"></textarea>
            </mat-form-field>

            <mat-form-field class="w-full">
              <mat-label>Description 3</mat-label>
              <textarea formControlName="description3" matInput rows="3"></textarea>
            </mat-form-field>

          </div>
        </div>

        <mat-divider class="my-4"></mat-divider>

        <div class="flex justify-end">
          <button color="primary" mat-flat-button type="submit">
            <mat-icon svgIcon="mat:save" class="mr-2"></mat-icon>
            {{ existingId ? 'Update' : 'Save' }} Handlooms
          </button>
        </div>

      </form>
    </div>

  </ux-page-layout-content>

</ux-page-layout>
