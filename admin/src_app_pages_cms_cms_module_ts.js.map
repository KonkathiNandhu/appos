<ux-page-layout>

  <ux-page-layout-header class="pb-10 flex flex-col items-start justify-center">
    <div [class.container]="layoutCtrl.value === 'boxed'"
         [class.px-gutter]="layoutCtrl.value === 'fullwidth'"
         class="w-full flex flex-col sm:flex-row justify-between">
      <div>
        <span class="title mt-0 mb-1" style="display: block; font-size: 30px; font-weight: 600;">About Us</span>
        <ux-breadcrumbs [crumbs]="['CMS', 'About Us']"></ux-breadcrumbs>
      </div>
    </div>
  </ux-page-layout-header>

  <ux-page-layout-content [class.container]="layoutCtrl.value === 'boxed'"
                           [class.px-gutter]="layoutCtrl.value === 'fullwidth'"
                           class="-mt-6">

    <div class="card -mt-16 p-6" @fadeInUp>
      <form [formGroup]="form" (ngSubmit)="save()">

        <!-- Content Paragraphs -->
        <h3 class="font-semibold text-lg mb-2">Content Paragraphs</h3>

        <mat-form-field class="w-full mt-2">
          <mat-label>Paragraph 1</mat-label>
          <textarea formControlName="para1" matInput rows="4"></textarea>
        </mat-form-field>

        <mat-form-field class="w-full">
          <mat-label>Paragraph 2</mat-label>
          <textarea formControlName="para2" matInput rows="4"></textarea>
        </mat-form-field>

        <mat-form-field class="w-full">
          <mat-label>Paragraph 3</mat-label>
          <textarea formControlName="para3" matInput rows="4"></textarea>
        </mat-form-field>

        <mat-form-field class="w-full">
          <mat-label>Paragraph 4</mat-label>
          <textarea formControlName="para4" matInput rows="4"></textarea>
        </mat-form-field>

        <mat-divider class="my-4"></mat-divider>

        <!-- Vision -->
        <h3 class="font-semibold text-lg mb-2">Vision</h3>
        <mat-form-field class="w-full">
          <mat-label>Vision Statement</mat-label>
          <textarea formControlName="vision" matInput rows="3"></textarea>
        </mat-form-field>

        <mat-divider class="my-4"></mat-divider>

        <!-- Status -->
        <div class="flex flex-col sm:flex-row gap-4">
          <mat-form-field class="flex-auto">
            <mat-label>Status</mat-label>
            <mat-select formControlName="status">
              <mat-option value="1">Active</mat-option>
              <mat-option value="0">In-Active</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <mat-divider class="my-4"></mat-divider>

        <!-- Objectives -->
        <div class="flex items-center justify-between mb-2">
          <h3 class="font-semibold text-lg m-0">Objectives</h3>
          <button (click)="addObjective()" color="primary" mat-stroked-button type="button">
            <mat-icon svgIcon="mat:add" class="mr-1"></mat-icon>
            Add Objective
          </button>
        </div>

        <div formArrayName="objectives">
          <div *ngFor="let obj of objectives.controls; let i = index" [formGroupName]="i"
               class="border rounded p-4 mb-3">
            <div class="flex items-center justify-between mb-2">
              <span class="font-medium">Objective {{ i + 1 }}</span>
              <button (click)="removeObjective(i)" color="warn" mat-icon-button type="button" matTooltip="Remove">
                <mat-icon svgIcon="mat:delete"></mat-icon>
              </button>
            </div>
            <mat-form-field class="w-full">
              <mat-label>Objective</mat-label>
              <textarea formControlName="objective" matInput rows="2"></textarea>
            </mat-form-field>
          </div>
        </div>

        <mat-divider class="my-4"></mat-divider>

        <!-- Mission -->
        <div class="flex items-center justify-between mb-2">
          <h3 class="font-semibold text-lg m-0">Mission</h3>
          <button (click)="addMission()" color="primary" mat-stroked-button type="button">
            <mat-icon svgIcon="mat:add" class="mr-1"></mat-icon>
            Add Mission
          </button>
        </div>

        <div formArrayName="mission">
          <div *ngFor="let m of missionList.controls; let i = index" [formGroupName]="i"
               class="border rounded p-4 mb-3">
            <div class="flex items-center justify-between mb-2">
              <span class="font-medium">Mission {{ i + 1 }}</span>
              <button (click)="removeMission(i)" color="warn" mat-icon-button type="button" matTooltip="Remove">
                <mat-icon svgIcon="mat:delete"></mat-icon>
              </button>
            </div>
            <mat-form-field class="w-full">
              <mat-label>Mission Statement</mat-label>
              <textarea formControlName="mission" matInput rows="2"></textarea>
            </mat-form-field>
          </div>
        </div>

        <mat-divider class="my-4"></mat-divider>

        <!-- Members -->
        <div class="flex items-center justify-between mb-2">
          <h3 class="font-semibold text-lg m-0">Members</h3>
          <button (click)="addMember()" color="primary" mat-stroked-button type="button">
            <mat-icon svgIcon="mat:add" class="mr-1"></mat-icon>
            Add Member
          </button>
        </div>

        <div formArrayName="members_list">
          <div *ngFor="let member of membersList.controls; let i = index" [formGroupName]="i"
               class="border rounded p-4 mb-3">
            <div class="flex items-center justify-between mb-2">
              <span class="font-medium">Member {{ i + 1 }}</span>
              <button (click)="removeMember(i)" color="warn" mat-icon-button type="button" matTooltip="Remove">
                <mat-icon svgIcon="mat:delete"></mat-icon>
              </button>
            </div>

            <div class="flex flex-col sm:flex-row gap-4">
              <mat-form-field class="flex-auto">
                <mat-label>Name</mat-label>
                <input formControlName="name" matInput>
                <mat-icon class="mr-3" matPrefix svgIcon="mat:person"></mat-icon>
              </mat-form-field>

              <mat-form-field class="flex-auto">
                <mat-label>Designation</mat-label>
                <input formControlName="designation" matInput>
              </mat-form-field>
            </div>

            <mat-form-field class="w-full">
              <mat-label>Image URL</mat-label>
              <input formControlName="image" matInput>
              <mat-icon class="mr-3" matPrefix svgIcon="mat:image"></mat-icon>
            </mat-form-field>
          </div>
        </div>

        <mat-divider class="my-4"></mat-divider>

        <!-- Save Button -->
        <div class="flex justify-end">
          <button color="primary" mat-flat-button type="submit">
            <mat-icon svgIcon="mat:save" class="mr-2"></mat-icon>
            {{ existingId ? 'Update' : 'Save' }} About Us
          </button>
        </div>

      </form>
    </div>

  </ux-page-layout-content>

</ux-page-layout>
