<ux-page-layout>

  <ux-page-layout-header class="pb-10 flex flex-col items-start justify-center">
    <div class="w-full flex flex-col sm:flex-row justify-between px-gutter">
      <div>
        <span class="title mt-0 mb-1" style="display: block; font-size: 30px; font-weight: 600;">Tenders</span>
        <ux-breadcrumbs [crumbs]="['CMS', 'Tenders']"></ux-breadcrumbs>
      </div>
    </div>
  </ux-page-layout-header>

  <ux-page-layout-content class="px-gutter -mt-6">

    <div class="card -mt-16 p-6" @fadeInUp>
      <form [formGroup]="form" (ngSubmit)="save()">

        <h3 class="font-semibold text-lg mb-2">Page Content</h3>
        
        <mat-form-field class="w-full">
          <mat-label>Page Title</mat-label>
          <input formControlName="page_title" matInput>
          <mat-icon class="mr-3" matPrefix svgIcon="mat:title"></mat-icon>
        </mat-form-field>

        <mat-form-field class="w-full">
          <mat-label>Page Description</mat-label>
          <textarea formControlName="page_description" matInput rows="3"></textarea>
        </mat-form-field>

        <mat-divider class="my-4"></mat-divider>

        <div class="flex flex-col sm:flex-row gap-4">
          <mat-form-field class="flex-auto">
            <mat-label>Status</mat-label>
            <mat-select formControlName="status">
              <mat-option value="1">Active</mat-option>
              <mat-option value="0">In-Active</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <mat-divider class="my-4"></mat-divider>

        <div class="flex items-center justify-between mb-2">
          <h3 class="font-semibold text-lg m-0">Tender Documents</h3>
          <button (click)="addTender()" color="primary" mat-stroked-button type="button">
            <mat-icon svgIcon="mat:add" class="mr-1"></mat-icon>
            Add Tender
          </button>
        </div>

        <div formArrayName="tenders">
          <div *ngFor="let tender of tenders.controls; let i = index" [formGroupName]="i"
               class="border-2 rounded p-4 mb-4">

            <div class="flex items-center justify-between mb-3">
              <span class="font-semibold text-lg">Tender {{ i + 1 }}</span>
              <button (click)="removeTender(i)" color="warn" mat-icon-button type="button" matTooltip="Remove Tender">
                <mat-icon svgIcon="mat:delete"></mat-icon>
              </button>
            </div>

            <mat-form-field class="w-full">
              <mat-label>Tender Name</mat-label>
              <input formControlName="name" matInput>
              <mat-icon class="mr-3" matPrefix svgIcon="mat:description"></mat-icon>
            </mat-form-field>

            <div class="flex gap-4">
              <mat-form-field class="flex-auto">
                <mat-label>Date (DD-MM-YYYY)</mat-label>
                <input formControlName="date" matInput placeholder="06-02-2026">
                <mat-icon class="mr-3" matPrefix svgIcon="mat:calendar_today"></mat-icon>
              </mat-form-field>

              <mat-form-field class="flex-auto">
                <mat-label>Sort Order</mat-label>
                <input formControlName="sort_order" matInput type="number">
                <mat-icon class="mr-3" matPrefix svgIcon="mat:sort"></mat-icon>
              </mat-form-field>
            </div>

            <mat-form-field class="w-full">
              <mat-label>Document URL</mat-label>
              <input formControlName="document_url" matInput>
              <mat-icon class="mr-3" matPrefix svgIcon="mat:insert_drive_file"></mat-icon>
            </mat-form-field>

            <mat-form-field class="w-full">
              <mat-label>View URL</mat-label>
              <input formControlName="view_url" matInput>
              <mat-icon class="mr-3" matPrefix svgIcon="mat:visibility"></mat-icon>
            </mat-form-field>

            <mat-form-field class="w-full">
              <mat-label>Download URL</mat-label>
              <input formControlName="download_url" matInput>
              <mat-icon class="mr-3" matPrefix svgIcon="mat:download"></mat-icon>
            </mat-form-field>

          </div>
        </div>

        <mat-divider class="my-4"></mat-divider>

        <div class="flex justify-end">
          <button color="primary" mat-flat-button type="submit">
            <mat-icon svgIcon="mat:save" class="mr-2"></mat-icon>
            {{ existingId ? 'Update' : 'Save' }} Tenders
          </button>
        </div>

      </form>
    </div>

  </ux-page-layout-content>

</ux-page-layout>
