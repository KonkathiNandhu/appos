<ux-page-layout>

  <ux-page-layout-header class="pb-10 flex flex-col items-start justify-center">
    <div [class.container]="layoutCtrl.value === 'boxed'"
         [class.px-gutter]="layoutCtrl.value === 'fullwidth'"
         class="w-full flex flex-col sm:flex-row justify-between">
      <div>
        <span class="title mt-0 mb-1" style="display: block; font-size: 30px; font-weight: 600;">Handicrafts</span>
        <ux-breadcrumbs [crumbs]="['CMS', 'Handicrafts']"></ux-breadcrumbs>
      </div>
    </div>
  </ux-page-layout-header>

  <ux-page-layout-content [class.container]="layoutCtrl.value === 'boxed'"
                           [class.px-gutter]="layoutCtrl.value === 'fullwidth'"
                           class="-mt-6">

    <div class="card -mt-16 p-6" @fadeInUp>
      <form [formGroup]="form" (ngSubmit)="save()">

        <!-- Description -->
        <h3 class="font-semibold text-lg mb-2">Description</h3>
        <mat-form-field class="w-full mt-2">
          <mat-label>Handicrafts Description</mat-label>
          <textarea formControlName="description" matInput rows="6"></textarea>
        </mat-form-field>

        <mat-divider class="my-4"></mat-divider>

        <!-- Status -->
        <div class="flex flex-col sm:flex-row gap-4">
          <mat-form-field class="flex-auto">
            <mat-label>Status</mat-label>
            <mat-select formControlName="status">
              <mat-option value="1">Active</mat-option>
              <mat-option value="0">In-Active</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <mat-divider class="my-4"></mat-divider>

        <!-- Gallery Sections -->
        <div class="flex items-center justify-between mb-2">
          <h3 class="font-semibold text-lg m-0">Gallery Sections</h3>
          <button (click)="addSection()" color="primary" mat-stroked-button type="button">
            <mat-icon svgIcon="mat:add" class="mr-1"></mat-icon>
            Add Section
          </button>
        </div>

        <div formArrayName="gallery_sections">
          <div *ngFor="let section of gallerySections.controls; let si = index" [formGroupName]="si"
               class="border rounded p-4 mb-4">

            <div class="flex items-center justify-between mb-3">
              <span class="font-semibold text-base">Section {{ si + 1 }}</span>
              <button (click)="removeSection(si)" color="warn" mat-icon-button type="button" matTooltip="Remove Section">
                <mat-icon svgIcon="mat:delete"></mat-icon>
              </button>
            </div>

            <mat-form-field class="w-full">
              <mat-label>Section Title</mat-label>
              <input formControlName="title" matInput>
              <mat-icon class="mr-3" matPrefix svgIcon="mat:category"></mat-icon>
            </mat-form-field>

            <!-- Images within this section -->
            <div class="flex items-center justify-between mb-2 mt-2">
              <span class="font-medium text-sm">Images</span>
              <button (click)="addImage(si)" color="accent" mat-stroked-button type="button" class="text-sm">
                <mat-icon svgIcon="mat:add_photo_alternate" class="mr-1"></mat-icon>
                Add Image
              </button>
            </div>

            <div [formArrayName]="'images'">
              <div *ngFor="let img of getSectionImages(si).controls; let ii = index" [formGroupName]="ii"
                   class="border rounded p-3 mb-2 bg-gray-50">

                <div class="flex items-center justify-between mb-2">
                  <span class="text-sm font-medium">Image {{ ii + 1 }}</span>
                  <button (click)="removeImage(si, ii)" color="warn" mat-icon-button type="button" matTooltip="Remove Image">
                    <mat-icon svgIcon="mat:close" class="icon-sm"></mat-icon>
                  </button>
                </div>

                <div class="flex flex-col sm:flex-row gap-4">
                  <mat-form-field class="flex-auto">
                    <mat-label>Name</mat-label>
                    <input formControlName="name" matInput>
                  </mat-form-field>

                  <mat-form-field class="flex-auto">
                    <mat-label>Navigation Route</mat-label>
                    <input formControlName="navigation_route" matInput>
                  </mat-form-field>
                </div>

                <mat-form-field class="w-full">
                  <mat-label>Image Path</mat-label>
                  <input formControlName="image_path" matInput>
                  <mat-icon class="mr-3" matPrefix svgIcon="mat:image"></mat-icon>
                </mat-form-field>
              </div>
            </div>

          </div>
        </div>

        <mat-divider class="my-4"></mat-divider>

        <!-- Save Button -->
        <div class="flex justify-end">
          <button color="primary" mat-flat-button type="submit">
            <mat-icon svgIcon="mat:save" class="mr-2"></mat-icon>
            {{ existingId ? 'Update' : 'Save' }} Handicrafts
          </button>
        </div>

      </form>
    </div>

  </ux-page-layout-content>

</ux-page-layout>
