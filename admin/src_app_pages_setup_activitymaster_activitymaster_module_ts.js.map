<form (ngSubmit)="save()" [formGroup]="form">
  <div class="flex items-center" mat-dialog-title>
    <h2 *ngIf="form.get('activity_name').value"
        class="headline m-0 flex-auto">{{ form.get('activity_name').value }}</h2>
    <h2 *ngIf="!form.get('activity_name').value"
        class="headline m-0 flex-auto">New Activity</h2>

    <button class="text-secondary" mat-dialog-close mat-icon-button type="button">
      <mat-icon svgIcon="mat:close"></mat-icon>
    </button>
  </div>

  <mat-divider class="-mx-6 text-border"></mat-divider>

  <mat-dialog-content class="flex flex-col">
    <div class="flex flex-col sm:flex-row">
      <mat-form-field class="mt-6 flex-auto">
        <mat-label>Activity Name</mat-label>
        <input cdkFocusInitial formControlName="activity_name" matInput>

        <mat-icon class="mr-3" matPrefix svgIcon="mat:person"></mat-icon>
      </mat-form-field>
    </div>

    <mat-form-field class="flex-auto">
      <mat-label>Description</mat-label>
      <textarea formControlName="activity_description" matInput></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button mat-dialog-close type="button">Cancel</button>
    <button *ngIf="isCreateMode()" color="primary" mat-flat-button type="submit">Create Activity</button>
    <button *ngIf="isUpdateMode()" color="primary" mat-flat-button type="submit">Update Activity</button>
  </mat-dialog-actions>
</form>
