<form (ngSubmit)="save()" [formGroup]="form">
  <div class="flex items-center" mat-dialog-title>
    <h2 *ngIf="form.get('sub_category_name').value"
        class="headline m-0 flex-auto">Sub Category</h2>
    <h2 *ngIf="!form.get('sub_category_name').value"
        class="headline m-0 flex-auto">New Sub Category</h2>

    <button class="text-secondary" mat-dialog-close mat-icon-button type="button">
      <mat-icon svgIcon="mat:close"></mat-icon>
    </button>
  </div>

  <mat-divider class="-mx-6 text-border"></mat-divider>

  <mat-dialog-content class="flex flex-col">
    <div class="flex flex-col sm:flex-row">
      <mat-form-field class="mt-6 flex-auto">
        <mat-label>Sub Category Name</mat-label>
        <input cdkFocusInitial formControlName="sub_category_name" matInput>

        <mat-icon class="mr-3" matPrefix svgIcon="mat:person"></mat-icon>
      </mat-form-field>

      <mat-form-field class="sm:mt-6 sm:ml-6 flex-auto">
        <mat-select formControlName="super_category_id">
          <mat-option *ngFor="let obj of super_categories_list" [value]="obj._id">
            {{obj.super_category_name }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <mat-form-field class="flex-auto">
      <mat-label>Description</mat-label>
      <textarea formControlName="sub_category_description" matInput></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button mat-dialog-close type="button">Cancel</button>
    <button *ngIf="isCreateMode()" color="primary" mat-flat-button type="submit">Create Sub Category</button>
    <button *ngIf="isUpdateMode()" color="primary" mat-flat-button type="submit">Update Sub Category</button>
  </mat-dialog-actions>
</form>
