<ux-page-layout>
  <ux-page-layout-header class="pb-10 flex flex-col items-start justify-center">
    <div [class.container]="layoutCtrl.value === 'boxed'" [class.px-gutter]="layoutCtrl.value === 'fullwidth'"
      class="w-full flex flex-col sm:flex-row justify-between">
      <div>
        <span class="title mt-0 mb-1" style="display: block; font-size: 30px; font-weight: 600;">POS
          Administration</span>
        <ux-breadcrumbs [crumbs]="['Administration', 'POS Administration']"></ux-breadcrumbs>
      </div>
    </div>
  </ux-page-layout-header>

  <ux-page-layout-content [class.container]="layoutCtrl.value === 'boxed'"
    [class.px-gutter]="layoutCtrl.value === 'fullwidth'" class="-mt-6" *ngIf="page_mode === 'Grid'">

    <div class="card overflow-auto -mt-16">
      <div class="bg-app-bar px-6 h-16 border-b sticky left-0 flex items-center">
        <span class="flex-1"></span>
        <div
          class="bg-foreground rounded-full border px-4 max-w-[300px] flex-auto flex items-center border border-gray-300">
          <mat-icon class="icon-sm text-secondary" svgIcon="mat:search"></mat-icon>
          <input [formControl]="searchCtrl" class="px-4 py-2 border-0 outline-none w-full bg-transparent"
            placeholder="Search..." type="search">
        </div>

      </div>
    </div>

    <div class="mt-2 flex flex-col md:flex-row md:items-start">
      <div class="card max-w-unset md:max-w-xs w-full flex-none mt-2 md:mt-0">
        <div class="px-6 py-4 border-b">
          <h2 class="title m-0">Select Unit</h2>
        </div>
        <div style="margin: 10px;">
          <mat-card *ngFor="let unit of unitmaster_list; let i = index;"
            [ngClass]="(unitselected_index === i) ? 'w3-deep-orange w3-text-white' : 'w3-light-grey w3-text-black'"
            style="margin-bottom: 5px; cursor: pointer;" (click)="onSelectUnit(unit, i)">
            {{ unit.unit_name }}
          </mat-card>
        </div>
      </div>
      <div class="card max-w-unset md:max-w-xs w-full flex-none md:ltr:ml-6 md:rtl:mr-6 mt-2 md:mt-0 w3-animate-left"
        *ngIf="unitselected_index != undefined">
        <div class="px-6 py-4 border-b">
          <h2 class="title m-0">Select Activities</h2>
        </div>
        <div style="margin: 10px;">
          <mat-card *ngFor="let activity of activitymaster_list; let i = index;" style="margin-bottom: 5px;">
            <mat-checkbox class="checkbox-margin w3-block" [(ngModel)]="activity.selected">
              {{ activity.activity_name }}
            </mat-checkbox>
            <button mat-raised-button class="w3-margin-top w3-block"
              [ngClass]="!activity.selected ? 'w3-light-grey' : 'w3-black'"
              [disabled]="!activity.selected" (click)="onSetupClicked(activity, i)">SETUP</button>
          </mat-card>
        </div>
      </div>
      <div class="flex-auto w3-animate-left" *ngIf="unitselected_index != undefined && activityselected_index != undefined">
        <div class="card md:ltr:ml-6 md:rtl:mr-6">
          <div class="px-gutter py-4 border-b">
            <h2 class="title m-0">Add Billing Items</h2>
          </div>
          <div class="px-gutter py-4 w3-margin-top">
            <form [formGroup]="posForm" (ngSubmit)="onSavePos()">
              <div formArrayName="posnames">
                <div *ngFor="let entityCtrl of poscontrols; let i = index;" [formGroupName]="i" style="display:flex;align-items:center;">
                  <mat-form-field appearance="standard" style="width: 30%;">
                    <mat-label>Item Name</mat-label>
                    <input matInput placeholder="Enter Item Name" formControlName="itemname" autocomplete="off">
                  </mat-form-field>
                  <mat-form-field appearance="standard" style="width: 15%; padding-left: 10px;">
                    <mat-label>Item Price</mat-label>
                    <input matInput placeholder="Enter Item Price" formControlName="itemprice" autocomplete="off">
                  </mat-form-field>
                  <mat-form-field appearance="standard" style="width: 35%; padding-left: 10px;">
                    <mat-label>Description</mat-label>
                    <input matInput placeholder="Enter Description" formControlName="itemdescription" autocomplete="off">
                  </mat-form-field>
                  <button type="button" mat-raised-button class="w3-text-red w3-right" style="width: 20%;" (click)="onDeleteItem(i)">
                    REMOVE</button>
                </div>
              </div>
              <div>
                <button type="button" mat-stroked-button class="w3-text-blue w3-block" (click)="onAddNew()">ADD
                  NEW ROW</button>
              </div>
              <div class="w3-margin-top w3-margin-bottom">
                <button mat-raised-button class="w3-green w3-block" type="submit">SAVE
                  PAGES
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>


    </div>
  </ux-page-layout-content>

</ux-page-layout>
